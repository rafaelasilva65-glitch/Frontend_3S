{% extends 'base.html' %}

{% block conteudo %}

<h1>Funcionarios</h1>

<!-- Button trigger modal -->
<button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#staticBackdrop">
    Novo funcionario
</button>

<!-- Modal -->
<div class="modal fade" id="staticBackdrop" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1"
     aria-labelledby="staticBackdropLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h1 class="modal-title fs-5" id="staticBackdropLabel">Cadastre-se</h1>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="form-cadastro_funcionario" class="form-subtrair" action="{{url_for('cadastro_funcionario')}}" method="post">
                    <label>
                        Nome:
                        <input id="input-nome" placeholder="Digite o nome" name="form-nome" class="form-control w-100">
                    </label>

                    <label>
                        Data de Nascimento:
                        <input id="input-data_nascimento" type="date" placeholder="Digite a Data" name="form-data" class="form-control w-100">
                    </label>

                    <label>
                        CPF:
                        <input id="input-cpf" placeholder="Digite o CPF" name="form-cpf" class="form-control w-100">
                    </label>

                    <label>
                        Email:
                        <input id="input-email" type="email" placeholder="Digite o Email" name="form-email" class="form-control w-100">
                    </label>

                    <label>
                        Senha:
                        <input id="input-senha" type="password" placeholder="Digite a Senha" name="form-senha"
                               class="form-control w-100">
                    </label>

                    <label>
                        Cargo:
                        <input id="input-cargo" placeholder="Digite a Cargo" name="form-cargo" class="form-control w-100">
                    </label>

                    <label>
                        Salario:
                        <input id="input-salario" placeholder="Digite a salario" name="form-salario" class="form-control w-100">
                    </label>

                    <button type="submit" class="btn btn-info w-100">Cadastrar</button>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary btn-danger" data-bs-dismiss="modal">Fechar</button>
                <button class="btn btn-danger my-2" onclick="limpaInputsLogin()">Cancelar</button>
            </div>
        </div>
    </div>
</div>

<table class="table">
    <thead>
    <tr>
        <th scope="col">ID</th>
        <th scope="col">Nome</th>
        <th scope="col">Data de nascimento</th>
        <th scope="col">CPF</th>
        <th scope="col">Email</th>
        <th scope="col">Senha</th>
        <th scope="col">Cargo</th>
        <th scope="col">Salario</th>
        <th scope="col">Ações</th>
    </tr>
    </thead>
    <tbody>
    <tr>

                href=""></a></td>
    </tr>

</table>

{% endblock %}
